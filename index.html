<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tenniswithouta.net</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Courier New, sans-serif;
    font-size: 6px;
    background: #ffffff;
    color: #0000ff;
    cursor: none;
}

.container {
    text-align: center;
}

/* main cursor */
.cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #000000;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* echo circles */
.echo {
    position: fixed;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    background: black;
    filter: blur(0.3px);
}

</style>
</head>

<body>

<main class="container">
    <h1>tenniswithouta.net</h1>
    <h2>creative</h2>
</main>

<div class="cursor"></div>

<script>
const cursor = document.querySelector(".cursor");

// fewer but tighter echoes (key change)
const COUNT = 10;

const echoes = [];

for (let i = 0; i < COUNT; i++) {
    const el = document.createElement("div");
    el.className = "echo";
    document.body.appendChild(el);

    echoes.push({
        el,
        x: 0,
        y: 0,
        lag: 0.08 + i * 0.01 // SHORTER delay chain
    });
}

let mouseX = 0, mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {

    // main cursor
    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    for (let i = 0; i < echoes.length; i++) {
        const e = echoes[i];

        e.x += (mouseX - e.x) * e.lag;
        e.y += (mouseY - e.y) * e.lag;

        const dx = mouseX - e.x;
        const dy = mouseY - e.y;

        const dist = Math.sqrt(dx * dx + dy * dy);

        // brightness mapping:
        // farther = brighter (your request)
        const brightness = Math.min(1, dist / 120);

        e.el.style.left = e.x + "px";
        e.el.style.top = e.y + "px";

        // size + glow based on distance
        const size = 6 + i * 1.2;

        e.el.style.width = size + "px";
        e.el.style.height = size + "px";

        e.el.style.opacity = brightness * 0.9;

        e.el.style.boxShadow =
            `0 0 ${brightness * 12}px rgba(0,0,0,${brightness * 0.6})`;

        // slight scaling depth feel
        e.el.style.transform = `translate(-50%, -50%) scale(${1 + brightness * 0.3})`;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

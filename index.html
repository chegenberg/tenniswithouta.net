<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tenniswithouta.net</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Courier New, sans-serif;
    font-size: 6px;
    background: #ffffff;
    cursor: none;
    color: #0000ff;
}

.container {
    text-align: center;
}

.cursor {
    position: fixed;
    width: 24px;
    height: 24px;
    background: rgb(255,255,0);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px rgb(255, 230, 0);
}

.echo {
    position: fixed;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    pointer-events: none;

    /* IMPORTANT: removes subpixel blur artifacts */
    transform: translate(-50%, -50%);
    will-change: transform;
}
</style>
</head>

<body>

<main class="container">
    <h1>tenniswithouta.net</h1>
    <h2>creative</h2>
</main>

<div class="cursor"></div>

<script>
const cursor = document.querySelector(".cursor");

const COUNT = 18;
const SPRING = 0.16;
const DAMPING = 0.62;

const echoes = [];

for (let i = 0; i < COUNT; i++) {
    const el = document.createElement("div");
    el.className = "echo";
    document.body.appendChild(el);

    echoes.push({
        el,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        lag: 0.6 + (i / COUNT) * 5.5
    });
}

let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {

    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    const mxVel = mouseX - prevMouseX;
    const myVel = mouseY - prevMouseY;

    prevMouseX = mouseX;
    prevMouseY = mouseY;

    for (let i = 0; i < echoes.length; i++) {
        const e = echoes[i];

        const targetX = mouseX - mxVel * e.lag;
        const targetY = mouseY - myVel * e.lag;

        const fx = (targetX - e.x) * SPRING;
        const fy = (targetY - e.y) * SPRING;

        e.vx = (e.vx + fx) * DAMPING;
        e.vy = (e.vy + fy) * DAMPING;

        e.x += e.vx;
        e.y += e.vy;

        // IMPORTANT: snap to pixels (removes size shimmer illusion)
        const x = Math.round(e.x);
        const y = Math.round(e.y);

        const t = i / (COUNT - 1);

        // PURE COLOR GRADIENT (no alpha anywhere)
        const r = 255;
        const g = Math.floor(255 - (200 * t));
        const b = 0;

        e.el.style.left = x + "px";
        e.el.style.top = y + "px";

        e.el.style.backgroundColor = `rgb(${r},${g},${b})`;

        // no opacity, no shadow = no stacking artifacts
    }
}

animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tenniswithouta.net</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Courier New, sans-serif;
    font-size: 6px;
    background: #ffffff;
    cursor: none;
}

.container {
    text-align: center;
}

/* main cursor */
.cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #0000ff;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* echo circles */
.echo {
    position: fixed;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

</style>
</head>

<body>

<main class="container">
    <h1>tenniswithouta.net</h1>
    <h2>creative</h2>
</main>

<div class="cursor"></div>

<script>
const cursor = document.querySelector(".cursor");

const COUNT = 14;

// spring physics tuning
const SPRING = 0.18;
const DAMPING = 0.72;

const echoes = [];

for (let i = 0; i < COUNT; i++) {
    const el = document.createElement("div");
    el.className = "echo";
    document.body.appendChild(el);

    echoes.push({
        el,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        lag: 1 + i * 0.35 // each layer slightly “heavier”
    });
}

let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function animate() {

    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    // cursor velocity (drives overshoot intensity)
    const mxVel = mouseX - prevMouseX;
    const myVel = mouseY - prevMouseY;

    prevMouseX = mouseX;
    prevMouseY = mouseY;

    for (let i = 0; i < echoes.length; i++) {
        const e = echoes[i];

        // target offset (creates layered delay)
        const targetX = mouseX - mxVel * e.lag;
        const targetY = mouseY - myVel * e.lag;

        // spring physics (this is where overshoot happens)
        const fx = (targetX - e.x) * SPRING;
        const fy = (targetY - e.y) * SPRING;

        e.vx = (e.vx + fx) * DAMPING;
        e.vy = (e.vy + fy) * DAMPING;

        e.x += e.vx;
        e.y += e.vy;

        const dx = mouseX - e.x;
        const dy = mouseY - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        const t = Math.min(1, dist / 200);

        // blue → white based on distance
        const r = lerp(0, 255, t);
        const g = lerp(0, 255, t);
        const b = 255;

        e.el.style.left = e.x + "px";
        e.el.style.top = e.y + "px";
        e.el.style.background = `rgb(${r},${g},${b})`;

        // glow intensifies with motion distance
        e.el.style.boxShadow = `0 0 ${t * 12}px rgba(${r},${g},${b},0.6)`;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tenniswithouta.net</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Courier New, sans-serif;
    font-size: 6px;
    background: #ffffff;
    color: #0000ff;
    cursor: none;
}

.container {
    text-align: center;
}

/* base cursor style */
.cursor,
.echo {
    position: fixed;
    width: 36px;
    height: 36px;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* black arrow shape */
.cursor::before,
.echo::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #000000;
    clip-path: polygon(
        0 0,
        0 100%,
        30% 70%,
        55% 95%,
        70% 80%,
        45% 55%,
        100% 55%
    );
}

.echo {
    opacity: 0.7;
}

</style>
</head>

<body>

<main class="container">
    <h1>tenniswithouta.net</h1>
    <h2>creative</h2>
</main>

<div class="cursor"></div>

<script>
const cursor = document.querySelector(".cursor");

// number of echoes (safe range: 8–20)
const COUNT = 14;

// create echo elements once (important for performance)
const echoes = [];

for (let i = 0; i < COUNT; i++) {
    const el = document.createElement("div");
    el.className = "echo";
    document.body.appendChild(el);

    echoes.push({
        el,
        x: 0,
        y: 0,
        lag: 0.05 + (i * 0.015), // different delay per echo
    });
}

let mouseX = 0, mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {

    // main cursor (sharp)
    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    // echoes (multi-delay trail)
    for (let i = 0; i < echoes.length; i++) {
        const e = echoes[i];

        e.x += (mouseX - e.x) * e.lag;
        e.y += (mouseY - e.y) * e.lag;

        // tiny jitter for glitch feel
        const jx = (Math.random() - 0.5) * (i * 0.4);
        const jy = (Math.random() - 0.5) * (i * 0.4);

        e.el.style.left = (e.x + jx) + "px";
        e.el.style.top  = (e.y + jy) + "px";

        // fade out further echoes
        e.el.style.opacity = 0.9 - (i / COUNT);
        e.el.style.transform = "translate(-50%, -50%) scale(" + (1 - i * 0.03) + ")";
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tenniswithouta.net</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Courier New, sans-serif;
    font-size: 6px;
    background: #ffffff;
    color: #0000ff;
    cursor: none;
}

.container {
    text-align: center;
}

/* main cursor */
.cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #0000ff;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* echo circles */
.echo {
    position: fixed;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

</style>
</head>

<body>

<main class="container">
    <h1>tenniswithouta.net</h1>
    <h2>creative</h2>
</main>

<div class="cursor"></div>

<script>
const cursor = document.querySelector(".cursor");

// fewer = cleaner + more readable gradient
const COUNT = 12;

const echoes = [];

for (let i = 0; i < COUNT; i++) {
    const el = document.createElement("div");
    el.className = "echo";
    document.body.appendChild(el);

    echoes.push({
        el,
        x: 0,
        y: 0,
        lag: 0.06 + i * 0.008 // tight delay stack
    });
}

let mouseX = 0, mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function animate() {

    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    for (let i = 0; i < echoes.length; i++) {
        const e = echoes[i];

        e.x += (mouseX - e.x) * e.lag;
        e.y += (mouseY - e.y) * e.lag;

        const dx = mouseX - e.x;
        const dy = mouseY - e.y;

        const dist = Math.sqrt(dx * dx + dy * dy);

        // normalize distance (0 → 1)
        const t = Math.min(1, dist / 180);

        // COLOR: blue -> white
        const r =  lerp(0, 255, t);
        const g =  lerp(0, 255, t);
        const b = 255;

        e.el.style.left = e.x + "px";
        e.el.style.top = e.y + "px";

        e.el.style.background = `rgb(${r},${g},${b})`;

        // subtle glow so blending feels smoother
        e.el.style.boxShadow = `0 0 ${t * 10}px rgba(${r},${g},${b},0.6)`;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

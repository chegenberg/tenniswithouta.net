<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glitchy Cursor</title>
  <style>
    body {
      background: #090909;
      color: #e8e8e8;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .terminal {
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #333;
      padding: 2rem;
      border-radius: 12px;
      width: min(90vw, 640px);
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.08);
    }

    .line {
      white-space: pre-wrap;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .cursor {
      display: inline-block;
      width: 12px;
      height: 1.2em;
      margin-left: 2px;
      background: #39ff14;
      animation: blink 1s step-end infinite, glitch 0.4s infinite alternate;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @keyframes glitch {
      0% { transform: translateX(0) skewX(0deg); opacity: 1; }
      25% { transform: translateX(-1px) skewX(-3deg); opacity: 0.8; }
      50% { transform: translateX(1px) skewX(2deg); opacity: 0.9; }
      75% { transform: translateX(-2px) skewX(1deg); opacity: 0.7; }
      100% { transform: translateX(0) skewX(0deg); opacity: 1; }
    }

    .input-row {
      margin-top: 1.4rem;
    }

    .input-row input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #444;
      border-radius: 8px;
      background: #111;
      color: #e8e8e8;
    }

    .input-row button {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      background: #39ff14;
      color: #071;
      font-weight: 700;
      cursor: pointer;
    }

    .preview {
      margin-top: 1.5rem;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      border: 1px solid #333;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="line" id="typed"></div>
    <div class="cursor"></div>

    <div class="input-row">
      <input id="gifUrl" placeholder="Paste a GIF URL here" />
      <button id="loadGif">Load GIF</button>
    </div>

    <div class="preview" id="preview"></div>
  </div>

  <script>
    const message = "echo Loading…\n> connecting to the glitch network...\n> injecting cursor delay...\n";
    const typed = document.getElementById("typed");
    let index = 0;

    function typeNext() {
      if (index < message.length) {
        typed.textContent += message[index++];
        const delay = 40 + Math.random() * 120;
        setTimeout(typeNext, delay);
      }
    }

    typeNext();

    document.getElementById("loadGif").addEventListener("click", () => {
      const url = document.getElementById("gifUrl").value.trim();
      const preview = document.getElementById("preview");
      preview.innerHTML = url
        ? `<img src="${url}" alt="Loaded GIF" />`
        : "<p style='color:#ff6b6b;'>Enter a valid GIF URL.</p>";
    });
  </script>
</body>
</html>
